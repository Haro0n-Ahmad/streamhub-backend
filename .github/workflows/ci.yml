name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        cd apps/backend
        npm ci
    
    - name: Run linter
      run: |
        cd apps/backend
        npm run lint || echo "Linting skipped"
    
    - name: Run tests
      run: |
        cd apps/backend
        npm test

  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        cd apps/frontend
        npm ci
    
    - name: Run linter
      run: |
        cd apps/frontend
        npm run lint
    
    - name: Build
      run: |
        cd apps/frontend
        npm run build
    
    - name: Run tests
      run: |
        cd apps/frontend
        npm test

  build-docker:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker images
      run: docker-compose build
